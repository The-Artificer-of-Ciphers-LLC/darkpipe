# Podman compatibility overrides for cloud-relay
# Layer with: podman-compose -f docker-compose.yml -f docker-compose.podman.yml up -d
#
# Enables Docker Compose compatibility flags so Podman interprets
# Docker-specific fields (depends_on conditions, service_healthy, etc.)
# and uses Docker-compatible network naming conventions.

x-podman:
  docker_compose_compat: true
  default_net_name_compat: true
