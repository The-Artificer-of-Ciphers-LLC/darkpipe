# Rspamd DKIM signing configuration for DarkPipe
#
# Signing scope:
#   - sign_authenticated = true  → Signs mail from authenticated SMTP submission (port 587)
#   - sign_local = true          → Signs mail from local container network
#   - sign_networks = "10.8.0.0/24" → Signs mail from WireGuard tunnel peers
#
# What is NOT signed (by design):
#   Inbound mail arriving on port 25 from external sources is NOT signed.
#   Rspamd only signs when the message originates from an authenticated user,
#   a local network, or a network listed in sign_networks. External inbound
#   mail does not match any of these conditions, so it passes through unsigned.
#   Re-signing inbound mail would break the original sender's DKIM signature.
#
# Key provisioning lifecycle:
#   1. Generate key pair:  go run dns/dkim/keygen.go (produces {selector}.private.pem)
#   2. Convert to Rspamd format: copy private PEM to
#        home-device/spam-filter/rspamd/dkim-keys/${domain}.${selector}.key
#   3. Publish public key as DNS TXT record:
#        ${selector}._domainkey.${domain} → "v=DKIM1; k=rsa; p=<base64-public-key>"
#      (DNS record provisioning handled by dns/dkim/ utilities and S01 tasks)
#   4. Rspamd picks up the key automatically on next message — no restart needed
#      if the key file is present at the expected path.
#
# Key naming convention:
#   /var/lib/rspamd/dkim/${domain}.${selector}.key
#   Example: /var/lib/rspamd/dkim/example.com.darkpipe.key
#
# Reference: dns/dkim/keygen.go (key generation), dns/dkim/signer.go (Go signing library)
# The Go signer uses relaxed/relaxed canonicalization — Rspamd defaults match this.

# Enable signing for authenticated submission (port 587 users)
sign_authenticated = true;

# Enable signing for mail originating from local Docker network
sign_local = true;

# Also sign mail from WireGuard tunnel network (home ↔ cloud relay)
sign_networks = "10.8.0.0/24";

# DKIM selector — matches the selector used in DNS TXT records
# Override with DKIM_SELECTOR env var in compose if needed
selector = "darkpipe";

# Allow signing even if envelope sender doesn't match From: header
# Users may send from any configured domain on the server
allow_username_mismatch = true;

# Key path template — Rspamd resolves ${domain} and ${selector} at signing time
path = "/var/lib/rspamd/dkim/${domain}.${selector}.key";

# Extract signing domain from the From: header
use_domain = "header";

# Use relaxed/relaxed canonicalization (matches dns/dkim/signer.go config)
# This is Rspamd's default, stated explicitly for clarity
sign_headers = "from:to:subject:date:message-id:mime-version:content-type";
