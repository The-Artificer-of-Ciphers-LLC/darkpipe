# Dovecot Configuration
# Documentation: https://doc.dovecot.org/
#
# This configuration provides:
# - IMAP service on port 993 (implicit TLS)
# - LMTP service for local delivery from Postfix
# - SASL authentication service for Postfix submission
# - Virtual user authentication (file-based)

# ============================================================================
# Protocols
# ============================================================================

protocols = imap lmtp

# ============================================================================
# Listeners
# ============================================================================

# Listen on all interfaces
listen = *

# ============================================================================
# TLS Configuration
# ============================================================================

# Require TLS for IMAP
ssl = required

# TLS certificate and key (self-signed, generated by entrypoint.sh)
# For production with public DNS, replace with Let's Encrypt:
#   ssl_cert = </etc/letsencrypt/live/mail.example.com/fullchain.pem
#   ssl_key = </etc/letsencrypt/live/mail.example.com/privkey.pem
ssl_cert = </etc/ssl/mail/cert.pem
ssl_key = </etc/ssl/mail/key.pem

# TLS protocol versions (TLS 1.2+)
ssl_min_protocol = TLSv1.2

# Use server cipher preference
ssl_prefer_server_ciphers = yes

# ============================================================================
# Mail Location
# ============================================================================

# Maildir format at /var/mail/vhosts/<domain>/<user>/Maildir
# %d = domain, %n = username (without domain)
mail_location = maildir:/var/mail/vhosts/%d/%n/Maildir

# ============================================================================
# Authentication
# ============================================================================

# Disable plaintext authentication except over TLS
disable_plaintext_auth = yes

# Authentication mechanisms (plain and login for compatibility)
auth_mechanisms = plain login

# Passdb: password database (file-based)
passdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

# Userdb: user database (static - all users have same UID/GID)
userdb {
  driver = static
  args = uid=5000 gid=5000 home=/var/mail/vhosts/%d/%n
}

# ============================================================================
# LMTP Service (Postfix → Dovecot Local Delivery)
# ============================================================================

service lmtp {
  # Unix socket listener for Postfix
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    user = postfix
    group = postfix
    mode = 0600
  }
}

protocol lmtp {
  # Postmaster address for delivery failures
  postmaster_address = postmaster@example.com

  # Mail plugins for LMTP
  mail_plugins = $mail_plugins sieve
}

# ============================================================================
# SASL Auth Service (Dovecot → Postfix Authentication)
# ============================================================================

service auth {
  # Unix socket listener for Postfix SASL
  unix_listener /var/spool/postfix/private/auth {
    user = postfix
    group = postfix
    mode = 0660
  }
}

# ============================================================================
# IMAP Service
# ============================================================================

service imap-login {
  # IMAP login service (handles TLS)
  inet_listener imap {
    port = 0  # Disable plaintext IMAP (port 143)
  }

  inet_listener imaps {
    port = 993  # IMAPS (implicit TLS)
  }
}

protocol imap {
  # Mail plugins for IMAP
  mail_plugins = $mail_plugins
}

# ============================================================================
# Namespace Configuration
# ============================================================================

namespace inbox {
  inbox = yes
  separator = /

  # Default mailboxes
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }

  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }

  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }

  mailbox Spam {
    special_use = \Junk
    auto = subscribe
  }
}

# ============================================================================
# Sieve Configuration (Mail Filtering)
# ============================================================================

plugin {
  # Sieve script location
  sieve = file:~/sieve;active=~/.dovecot.sieve

  # Global sieve scripts (future use for spam filtering)
  # sieve_before = /etc/dovecot/sieve/before.d/
  # sieve_after = /etc/dovecot/sieve/after.d/
}

# ============================================================================
# Logging
# ============================================================================

# Log to stdout for container observability
log_path = /dev/stderr
info_log_path = /dev/stdout
debug_log_path = /dev/stdout

# Log verbosity
log_timestamp = "%Y-%m-%d %H:%M:%S "

# ============================================================================
# Process Configuration
# ============================================================================

# Maximum number of IMAP processes
service imap {
  process_limit = 1024
}

# Default process limit
default_process_limit = 100

# Default VSZ (virtual memory size) limit
default_vsz_limit = 256M

# ============================================================================
# User/Password Database Format
# ============================================================================

# /etc/dovecot/users file format:
# user@example.com:{PLAIN}password123
#
# Password schemes supported:
#   {PLAIN}password      - Plaintext (for testing only)
#   {SHA512-CRYPT}...    - SHA512 crypt hash (recommended)
#   {BLF-CRYPT}...       - Bcrypt hash (very secure)
#
# Generate hash: doveadm pw -s SHA512-CRYPT
#
# Example entries:
#   admin@example.com:{PLAIN}adminpass
#   user@example.com:{SHA512-CRYPT}$6$...
